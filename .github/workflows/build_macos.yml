name: Build macOS

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.35.6"
  RUST_VERSION: "1.84.1"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        working-directory: app
        run: |
          VERSION=$(grep "version:" pubspec.yaml | head -n 1 | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build_macos_zip_x86_64:
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: ${{ env.RUST_VERSION }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/rust_builder"

      - name: Dependencies
        working-directory: app
        run: flutter pub get

      - name: Compile for macOS
        working-directory: app
        run: |
          # Build with code signing disabled via xcodebuild arguments
          flutter build macos --release \
            --build-arg="CODE_SIGNING_ALLOWED=NO" \
            --build-arg="CODE_SIGN_IDENTITY=" \
            --build-arg="DEVELOPMENT_TEAM="

      - name: Zip compiled files
        working-directory: app
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../LinkDrop-macOS.zip LinkDrop.app

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip-x86-64-result
          path: app/LinkDrop-macOS.zip
